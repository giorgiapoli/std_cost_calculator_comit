<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Cost Estimator - Canary Islands | COMIT</title>
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; font-family: 'Georgia', 'Times New Roman', serif; background: #0F1923; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useCallback } = React;

        // Costi e configurazioni
        const COSTS = {
            VERONA_BARCELONA_FIXED: 2000,
            PALLETS_PER_TRUCK_DRY: 32,
            PALLETS_PER_TRUCK_FROZEN: 24,
            PALLET_COST: 15,
            FREIGHT_GOMMA: {
                GC: { DRY: 133.692, FRESH: 117, FROZEN: 133.692 },
                TF: { DRY: 133.692, FRESH: 117, FROZEN: 133.692 },
                LAN: { DRY: 190.254, FRESH: 190.254, FROZEN: 271.4976 },
                FUE: { DRY: 190.254, FRESH: 190.254, FROZEN: 271.4976 },
            },
            FREIGHT_MARE_CONTAINER: {
                GC_NORD: 2580.723404, GC_SUD: 2258.529412,
                TF_NORD: 2580.723404, TF_SUD: 2258.529412,
                LAN_NORD: 3521.4375, FUE_NORD: 3521.4375,
            },
            INLAND_CONTAINER: { GC: 762, TF: 762, LAN: 830, FUE: 830 },
            FUEL_SURCHARGE: 0.0284,
            INSURANCE: 0.005,
            PALLETS_PER_CONTAINER: 24,
            MTO_PER_PLT: { DRY: 8.16, FRESH: 10.2, FROZEN: 12.24 },
            MTS_DEPOSITO: { DRY: 14.4228, FRESH: 16.4832, FROZEN: 24.7248 },
            MTS_INBOUND: { DRY: 2.5755, FRESH: 3.6057, FROZEN: 3.6057 },
            MTS_PICKING: { DRY: 0.303, FRESH: 0.3434, FROZEN: 0.3535 },
        };

        const UOM_CONFIG = {
            PCS: { label: "PCS — Pezzo", icon: "🔢", priceLabel: "Prezzo per PEZZO (€)", showQty: true, qtyLabel: "Pezzi per cartone", qtySuffix: "pz", divisor: f => f.qtyPerBox * f.boxPerPallet, pickingDivisor: f => f.qtyPerBox },
            BOX: { label: "BOX — Cartone", icon: "📦", priceLabel: "Prezzo per CARTONE (€)", showQty: false, divisor: f => f.boxPerPallet, pickingDivisor: () => 1 },
            KG: { label: "KG — Chilogrammo", icon: "⚖️", priceLabel: "Prezzo per KG (€)", showQty: true, qtyLabel: "Kg per cartone", qtySuffix: "kg", divisor: f => f.qtyPerBox * f.boxPerPallet, pickingDivisor: f => f.qtyPerBox },
        };

        const UBIC_CONFIG = {
            MTO: { label: "MTO — Cross-docking", icon: "🔄", desc: "Costo In+Stock+Out per pallet", color: "#4A8C9B" },
            FOR: { label: "FOR — Franco fornitore", icon: "🚛", desc: "Nessun costo handling", color: "#6A9B4A" },
            MTS: { label: "MTS — Magazzino", icon: "🏭", desc: "Deposito + Inbound + Picking", color: "#C4873B" },
        };

        const ISLANDS = [
            { key: "GC", label: "Gran Canaria", flag: "🏝️" },
            { key: "TF", label: "Tenerife", flag: "🌋" },
            { key: "LAN", label: "Lanzarote", flag: "🌿" },
            { key: "FUE", label: "Fuerteventura", flag: "🏜️" },
        ];

        const TEMP_OPTIONS = [
            { value: "DRY", label: "🌾 Dry (Secco)", color: "#C4873B" },
            { value: "FRESH", label: "❄️ Fresh (Fresco)", color: "#3B82C4" },
            { value: "FROZEN", label: "🧊 Frozen (Surgelato)", color: "#6B3BC4" },
        ];

        const TRANSPORT_OPTIONS = [
            { value: "GOMMA", label: "🚛 Camion (Gomma)" },
            { value: "MARE", label: "🚢 Container (Mare)" },
        ];

        // Funzione di calcolo
        function calculateCost({ purchasePrice, uom, qtyPerBox, boxPerPallet, temperature, transport, aiem, area, isSelected, ubicazione }) {
            if (!purchasePrice || !boxPerPallet) return null;
            const uomCfg = UOM_CONFIG[uom];
            const unitsPerPallet = uomCfg.divisor({ qtyPerBox: parseFloat(qtyPerBox) || 0, boxPerPallet: parseFloat(boxPerPallet) || 0 });
            if (unitsPerPallet <= 0) return null;

            const results = {};
            ISLANDS.forEach(({ key }) => {
                if (!isSelected[key]) { results[key] = null; return; }

                let freightPerUnit = 0, inlandPerUnit = 0;

                if (transport === "GOMMA") {
                    const freightPerPallet = COSTS.FREIGHT_GOMMA[key]?.[temperature] || 0;
                    const veronaPerUnit = COSTS.VERONA_BARCELONA_FIXED / (temperature === "FROZEN" ? COSTS.PALLETS_PER_TRUCK_FROZEN : COSTS.PALLETS_PER_TRUCK_DRY) / unitsPerPallet;
                    const freightUnit = freightPerPallet / unitsPerPallet;
                    const fuel = freightUnit * COSTS.FUEL_SURCHARGE;
                    const insurance = purchasePrice * COSTS.INSURANCE;
                    freightPerUnit = veronaPerUnit + freightUnit + fuel + insurance;
                } else {
                    const containerKey = `${key}_${area}`;
                    const freightPerContainer = COSTS.FREIGHT_MARE_CONTAINER[containerKey] || COSTS.FREIGHT_MARE_CONTAINER[`${key}_NORD`] || 0;
                    const unitsPerContainer = COSTS.PALLETS_PER_CONTAINER * unitsPerPallet;
                    freightPerUnit = freightPerContainer / unitsPerContainer + purchasePrice * COSTS.INSURANCE;
                    inlandPerUnit = (COSTS.INLAND_CONTAINER[key] || 0) / unitsPerContainer;
                }

                const palletPerUnit = COSTS.PALLET_COST / unitsPerPallet;
                const aiemRate = aiem / 100;
                const aiemPerUnit = aiemRate > 0 ? (purchasePrice + freightPerUnit + inlandPerUnit + palletPerUnit) * aiemRate : 0;
                const step1 = purchasePrice + freightPerUnit + inlandPerUnit + palletPerUnit + aiemPerUnit;

                let warehousePerUnit = 0, warehouseDetail = null;
                if (ubicazione === "MTO") {
                    warehousePerUnit = (COSTS.MTO_PER_PLT[temperature] || 8.16) / unitsPerPallet;
                    warehouseDetail = { type: "MTO", total: warehousePerUnit };
                } else if (ubicazione === "MTS") {
                    const dep = (COSTS.MTS_DEPOSITO[temperature] || 14.4228) / unitsPerPallet;
                    const inbound = (COSTS.MTS_INBOUND[temperature] || 2.5755) / unitsPerPallet;
                    const picking = (COSTS.MTS_PICKING[temperature] || 0.303) / (uomCfg.pickingDivisor({ qtyPerBox: parseFloat(qtyPerBox) || 0, boxPerPallet: parseFloat(boxPerPallet) || 0 }) || 1);
                    warehousePerUnit = dep + inbound + picking;
                    warehouseDetail = { type: "MTS", dep, inbound, picking, total: warehousePerUnit };
                } else {
                    warehouseDetail = { type: "FOR", total: 0 };
                }

                results[key] = {
                    purchasePrice, freightPerUnit: parseFloat(freightPerUnit.toFixed(4)), inlandPerUnit: parseFloat(inlandPerUnit.toFixed(4)),
                    palletPerUnit: parseFloat(palletPerUnit.toFixed(4)), aiemPerUnit: parseFloat(aiemPerUnit.toFixed(4)), aiemRate,
                    step1: parseFloat(step1.toFixed(4)), warehousePerUnit: parseFloat(warehousePerUnit.toFixed(4)), warehouseDetail,
                    step2: parseFloat((step1 + warehousePerUnit).toFixed(4)), uomLabel: uom,
                };
            });
            return results;
        }

        // Componente principale
        function App() {
            const [form, setForm] = useState({ purchasePrice: "", qtyPerBox: "", boxPerPallet: "", uom: "PCS", temperature: "DRY", transport: "GOMMA", aiem: "4", area: "NORD", ubicazione: "MTO" });
            const [isSelected, setIsSelected] = useState({ GC: true, TF: true, LAN: false, FUE: false });
            const [results, setResults] = useState(null);

            const handleChange = (field, value) => { setForm(f => ({ ...f, [field]: value })); setResults(null); };
            const handleCalculate = () => { setResults(calculateCost({ ...form, purchasePrice: parseFloat(form.purchasePrice) || 0, boxPerPallet: parseFloat(form.boxPerPallet) || 0, qtyPerBox: form.qtyPerBox, aiem: parseFloat(form.aiem) || 0, isSelected })); };

            const uomCfg = UOM_CONFIG[form.uom];
            const canCalc = form.purchasePrice && form.boxPerPallet && (!uomCfg.showQty || form.qtyPerBox) && Object.values(isSelected).some(v => v);
            const tempColor = TEMP_OPTIONS.find(t => t.value === form.temperature)?.color || "#C4873B";

            return (
                <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0F1923 0%, #1A2B3C 100%)", color: "#E8E0D0", fontFamily: "'Georgia', serif" }}>
                    <div style={{ borderBottom: "1px solid rgba(196,135,59,0.3)", padding: "20px 40px", background: "rgba(0,0,0,0.2)" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: "20px" }}>
                            <div style={{ width: "44px", height: "44px", background: `linear-gradient(135deg, ${tempColor}, #1A3A4A)`, borderRadius: "8px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "22px" }}>🧮</div>
                            <div>
                                <div style={{ fontSize: "11px", letterSpacing: "3px", color: "#C4873B" }}>COMIT · Inalca Food & Beverage</div>
                                <div style={{ fontSize: "22px", fontWeight: "bold" }}>Standard Cost Estimator · Canarie</div>
                            </div>
                        </div>
                    </div>

                    <div style={{ maxWidth: "900px", margin: "0 auto", padding: "30px 20px" }}>
                        {/* Riga 1: UOM + Ubicazione */}
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px", marginBottom: "20px" }}>
                            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "10px", padding: "18px" }}>
                                <div style={{ fontSize: "10px", color: "#C4873B", marginBottom: "12px" }}>📐 UNITÀ DI MISURA</div>
                                <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "8px", marginBottom: "12px" }}>
                                    {Object.entries(UOM_CONFIG).map(([k, c]) => (
                                        <button key={k} onClick={() => handleChange("uom", k)} style={{ padding: "10px", background: form.uom === k ? `${tempColor}25` : "rgba(255,255,255,0.04)", border: `2px solid ${form.uom === k ? tempColor : "rgba(255,255,255,0.1)"}`, borderRadius: "8px", color: form.uom === k ? "#EEE" : "#aaa", cursor: "pointer" }}>{c.icon} {c.label.split(" —")[0]}</button>
                                    ))}
                                </div>
                            </div>

                            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "10px", padding: "18px" }}>
                                <div style={{ fontSize: "10px", color: "#C4873B", marginBottom: "12px" }}>🏭 GESTIONE MAGAZZINO</div>
                                <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                                    {Object.entries(UBIC_CONFIG).map(([k, c]) => (
                                        <button key={k} onClick={() => handleChange("ubicazione", k)} style={{ padding: "10px", background: form.ubicazione === k ? `${c.color}22` : "rgba(255,255,255,0.04)", border: `1px solid ${form.ubicazione === k ? c.color : "rgba(255,255,255,0.1)"}`, borderRadius: "8px", textAlign: "left", cursor: "pointer" }}>
                                            <span>{c.icon} {c.label}</span>
                                            <div style={{ fontSize: "10px", color: "#888" }}>{c.desc}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Riga 2: Prezzo + Temperatura + Trasporto */}
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px", marginBottom: "20px" }}>
                            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "10px", padding: "18px" }}>
                                <div style={{ fontSize: "10px", color: "#C4873B", marginBottom: "12px" }}>📦 PREZZO & CONTENENZA</div>
                                <input type="number" placeholder={uomCfg.priceLabel} value={form.purchasePrice} onChange={e => handleChange("purchasePrice", e.target.value)} style={{ width: "100%", padding: "10px", marginBottom: "10px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "6px", color: "#E8E0D0" }} />
                                {uomCfg.showQty && <input type="number" placeholder={uomCfg.qtyLabel} value={form.qtyPerBox} onChange={e => handleChange("qtyPerBox", e.target.value)} style={{ width: "100%", padding: "10px", marginBottom: "10px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "6px", color: "#E8E0D0" }} />}
                                <input type="number" placeholder="Cartoni per pallet" value={form.boxPerPallet} onChange={e => handleChange("boxPerPallet", e.target.value)} style={{ width: "100%", padding: "10px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "6px", color: "#E8E0D0" }} />
                                <input type="number" placeholder="AIEM % (0 = esenzione)" value={form.aiem} onChange={e => handleChange("aiem", e.target.value)} style={{ width: "100%", padding: "10px", marginTop: "10px", background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: "6px", color: "#E8E0D0" }} />
                            </div>

                            <div>
                                <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "10px", padding: "18px", marginBottom: "20px" }}>
                                    <div style={{ fontSize: "10px", color: "#C4873B", marginBottom: "12px" }}>🌡️ TEMPERATURA</div>
                                    {TEMP_OPTIONS.map(opt => (
                                        <button key={opt.value} onClick={() => handleChange("temperature", opt.value)} style={{ width: "100%", padding: "10px", marginBottom: "8px", background: form.temperature === opt.value ? `${opt.color}25` : "rgba(255,255,255,0.04)", border: `1px solid ${form.temperature === opt.value ? opt.color : "rgba(255,255,255,0.1)"}`, borderRadius: "6px", cursor: "pointer", textAlign: "left", color: "#E8E0D0" }}>{opt.label}</button>
                                    ))}
                                </div>

                                <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "10px", padding: "18px" }}>
                                    <div style={{ fontSize: "10px", color: "#C4873B", marginBottom: "12px" }}>🚚 TRASPORTO</div>
                                    {TRANSPORT_OPTIONS.map(opt => (
                                        <button key={opt.value} onClick={() => handleChange("transport", opt.value)} disabled={opt.value === "MARE" && form.temperature === "FROZEN"} style={{ width: "100%", padding: "10px", marginBottom: "8px", background: form.transport === opt.value ? "#4A8C9B25" : "rgba(255,255,255,0.04)", border: `1px solid ${form.transport === opt.value ? "#4A8C9B" : "rgba(255,255,255,0.1)"}`, borderRadius: "6px", cursor: "pointer", textAlign: "left", color: "#E8E0D0", opacity: opt.value === "MARE" && form.temperature === "FROZEN" ? 0.5 : 1 }}>{opt.label}</button>
                                    ))}
                                    {form.transport === "MARE" && (
                                        <div style={{ marginTop: "10px" }}>
                                            <div style={{ fontSize: "11px", marginBottom: "6px" }}>AREA FORNITORE</div>
                                            <div style={{ display: "flex", gap: "8px" }}>
                                                {["NORD", "SUD"].map(a => <button key={a} onClick={() => handleChange("area", a)} style={{ flex: 1, padding: "8px", background: form.area === a ? "#4A8C9B25" : "rgba(255,255,255,0.04)", border: `1px solid ${form.area === a ? "#4A8C9B" : "rgba(255,255,255,0.1)"}`, borderRadius: "6px", cursor: "pointer" }}>{a}</button>)}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Isole */}
                        <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "10px", padding: "18px", marginBottom: "20px" }}>
                            <div style={{ fontSize: "10px", color: "#C4873B", marginBottom: "12px" }}>🏝️ DESTINAZIONI</div>
                            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "10px" }}>
                                {ISLANDS.map(({ key, label, flag }) => (
                                    <button key={key} onClick={() => setIsSelected(s => ({ ...s, [key]: !s[key] }))} style={{ padding: "12px", background: isSelected[key] ? "rgba(196,135,59,0.18)" : "rgba(255,255,255,0.04)", border: `2px solid ${isSelected[key] ? "#C4873B" : "rgba(255,255,255,0.1)"}`, borderRadius: "8px", cursor: "pointer", textAlign: "center", color: isSelected[key] ? "#E8C97A" : "#aaa" }}>
                                        <div style={{ fontSize: "20px" }}>{flag}</div>
                                        <div style={{ fontSize: "11px", fontWeight: "bold" }}>{label}</div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Bottone Calcola */}
                        <button onClick={handleCalculate} disabled={!canCalc} style={{ width: "100%", padding: "16px", background: canCalc ? `linear-gradient(135deg, ${tempColor}, #1A3A4A)` : "rgba(255,255,255,0.05)", border: "none", borderRadius: "10px", color: canCalc ? "#fff" : "#666", fontSize: "15px", fontWeight: "bold", cursor: canCalc ? "pointer" : "not-allowed", marginBottom: "30px" }}>✦ CALCOLA STANDARD COST</button>

                        {/* Risultati */}
                        {results && (
                            <div>
                                <div style={{ fontSize: "11px", color: "#C4873B", marginBottom: "16px" }}>✦ RISULTATI</div>
                                <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: "16px" }}>
                                    {ISLANDS.filter(({ key }) => isSelected[key] && results[key]).map(({ key, label, flag }) => {
                                        const r = results[key];
                                        return (
                                            <div key={key} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(196,135,59,0.25)", borderRadius: "12px", padding: "20px" }}>
                                                <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "16px" }}>
                                                    <span style={{ fontSize: "20px" }}>{flag}</span>
                                                    <div><div style={{ fontSize: "14px", fontWeight: "bold" }}>{label}</div></div>
                                                </div>
                                                <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: "12px" }}><span>Prezzo acquisto</span><span>€ {r.purchasePrice.toFixed(4)}</span></div>
                                                <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: "12px" }}><span>Trasporto</span><span>€ {r.freightPerUnit.toFixed(4)}</span></div>
                                                {r.inlandPerUnit > 0 && <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: "12px" }}><span>Inland</span><span>€ {r.inlandPerUnit.toFixed(4)}</span></div>}
                                                <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: "12px" }}><span>Pallet</span><span>€ {r.palletPerUnit.toFixed(4)}</span></div>
                                                {r.aiemPerUnit > 0 && <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: "12px" }}><span>AIEM ({(r.aiemRate * 100).toFixed(1)}%)</span><span>€ {r.aiemPerUnit.toFixed(4)}</span></div>}
                                                <div style={{ borderTop: "1px solid rgba(196,135,59,0.2)", margin: "10px 0" }} />
                                                <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: "13px", fontWeight: "bold" }}><span>Standard Cost 1</span><span>€ {r.step1.toFixed(4)}</span></div>
                                                {r.warehouseDetail?.type === "MTO" && <div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: "12px" }}><span>MTO Handling</span><span>€ {r.warehouseDetail.total.toFixed(4)}</span></div>}
                                                {r.warehouseDetail?.type === "MTS" && (<><div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: "12px" }}><span>Deposito</span><span>€ {r.warehouseDetail.dep.toFixed(4)}</span></div><div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: "12px" }}><span>Inbound</span><span>€ {r.warehouseDetail.inbound.toFixed(4)}</span></div><div style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", fontSize: "12px" }}><span>Picking</span><span>€ {r.warehouseDetail.picking.toFixed(4)}</span></div></>)}
                                                <div style={{ marginTop: "12px", background: `linear-gradient(135deg, ${tempColor}20, rgba(0,0,0,0.2))`, border: `1px solid ${tempColor}50`, borderRadius: "8px", padding: "12px" }}>
                                                    <div style={{ fontSize: "10px", color: "#aaa" }}>STANDARD COST 2</div>
                                                    <div style={{ fontSize: "24px", fontWeight: "bold", color: "#E8C97A" }}>€ {r.step2.toFixed(4)}</div>
                                                    <div style={{ fontSize: "10px", color: "#aaa" }}>per {r.uomLabel}</div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>
</html>
